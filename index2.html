<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>教員別週間時間割</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1a1a1a;
            --accent: #f59e0b; /* 教員用はオレンジ系 */
            --text: #ffffff;
            --subject-normal: #ffffff;
            --subject-changed: #ffd700; /* 変更(☆)用の黄色 */
        }

        body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: sans-serif; display: flex; flex-direction: column; height: 100vh;
        }

        header {
            background-color: #0a0a0a; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--accent);
        }

        select {
            background: #333; color: #fff; border: 1px solid var(--accent);
            padding: 8px; font-size: 1.2vw; border-radius: 4px; cursor: pointer;
        }

        .nav-buttons { display: flex; gap: 8px; }
        .nav-btn {
            background-color: #333; color: #fff; border: 1px solid var(--accent);
            padding: 5px 15px; border-radius: 4px; cursor: pointer; font-size: 1vw;
        }

        #grid-container {
            flex: 1; display: grid;
            grid-template-columns: 7vw repeat(6, 1fr);
            grid-template-rows: 6vh repeat(7, 1fr);
            gap: 6px; padding: 10px;
        }

        .cell {
            background-color: var(--card); border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
        }

        .header-cell { background-color: #333; font-weight: bold; flex-direction: row; gap: 5px; }
        .header-date { font-size: 1.6vw; }
        .header-day { font-size: 1.1vw; color: #aaa; }
        .period-cell { background-color: #222; font-size: 2vw; font-weight: bold; color: var(--accent); }
        
        .subject { font-size: 1.5vw; font-weight: bold; line-height: 1.2; }
        .subject.normal { color: var(--subject-normal); }
        .subject.changed { color: var(--subject-changed); }
        
        .class-name { font-size: 1.1vw; color: #aaa; margin-top: 4px; }
        .is-today { background-color: #1e293b; box-shadow: inset 0 0 0 2px var(--accent); }
        
        #clock { font-size: 1.4vw; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:20px;">
        <select id="teacher-select" onchange="render()">
            <option value="">教員を選択してください</option>
        </select>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="updateWeek(-1)">前週</button>
            <button class="nav-btn" onclick="resetWeek()">今週</button>
            <button class="nav-btn" onclick="updateWeek(1)">次週</button>
        </div>
    </div>
    <div id="clock"></div>
</header>

<div id="grid-container"></div>

<script>
const CONFIG = {
    apiKey: 'AIzaSyDPVfkugEGBsIIM_tLYEynBvQhAzulnNSI',
    spreadsheetId: '17qPt1vJEMiE2I9SXRSHpPyyQFRJhwx2q0QWOGYRz3Oc'
};

let masterData = [];
let weekOffset = 0;
const dayLabels = ['日', '月', '火', '水', '木', '金', '土'];

async function init() {
    await Promise.all([loadTeachers(), loadSchedule()]);
}

// 教員リストの読み込み (A:名前, B:教科)
async function loadTeachers() {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.spreadsheetId}/values/${encodeURIComponent('教員リスト!A2:B100')}?key=${CONFIG.apiKey}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.values) {
        const select = document.getElementById('teacher-select');
        data.values.forEach(row => {
            const name = row[0];
            const subject = row[1] || "";
            if (!name) return;
            const option = document.createElement('option');
            option.value = name;
            option.textContent = `[${subject}] ${name}`;
            select.appendChild(option);
        });
    }
}

async function loadSchedule() {
    // A:Wを取得。B:星、C:日付、D:C判定、E:限、F:クラス、G:科目、I-W:教員
    const range = `結合!A2:W20000`;
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.spreadsheetId}/values/${encodeURIComponent(range)}?valueRenderOption=UNFORMATTED_VALUE&key=${CONFIG.apiKey}`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.values) {
        masterData = data.values.map(row => ({
            isChanged: String(row[1] || "").trim() === "☆",
            dateKey: String(row[2] || "").replace(/\D/g, ''),
            isC: String(row[3] || "").startsWith("C") || String(row[4] || "").startsWith("C"),
            period: parseInt(String(row[4] || "").match(/\d+/)) || null,
            className: String(row[5] || ""),
            subject: String(row[6] || ""),
            teachers: row.slice(8, 23).map(t => String(t || "").trim())
        })).filter(item => item.dateKey && item.period);
    }
}

function render() {
    const targetTeacher = document.getElementById('teacher-select').value;
    const container = document.getElementById('grid-container');
    const clock = document.getElementById('clock');
    
    const now = new Date();
    clock.innerText = now.toLocaleDateString('ja-JP', { month:'long', day:'numeric', weekday:'short' });

    if (!targetTeacher) { container.innerHTML = ""; return; }

    const startOfWeek = new Date();
    const dayIdx = startOfWeek.getDay();
    const diff = (dayIdx === 0 ? -6 : 1 - dayIdx) + (weekOffset * 7);
    startOfWeek.setDate(startOfWeek.getDate() + diff);
    startOfWeek.setHours(0,0,0,0);

    let html = '<div class="cell header-cell">時限</div>';
    const weekKeys = [];

    // ヘッダー生成
    for (let i = 0; i < 6; i++) {
        const d = new Date(startOfWeek);
        d.setDate(startOfWeek.getDate() + i);
        const key = `${d.getFullYear()}${d.getMonth() + 1}${d.getDate()}`;
        weekKeys.push(key);
        
        // その日の誰かの授業にC判定があるかチェック
        const hasC = masterData.some(item => item.dateKey === key && item.isC);
        const dayLabel = hasC ? "C" : dayLabels[d.getDay()];
        const isToday = d.toDateString() === now.toDateString();
        
        html += `
            <div class="cell header-cell ${isToday ? 'is-today' : ''}">
                <span class="header-date">${d.getMonth() + 1}/${d.getDate()}</span>
                <span class="header-day">(${dayLabel})</span>
            </div>
        `;
    }

    // 時間割本体
    for (let p = 1; p <= 7; p++) {
        html += `<div class="cell period-cell">${p}</div>`;
        weekKeys.forEach(key => {
            const match = masterData.find(item => 
                item.dateKey === key && 
                item.period === p && 
                item.teachers.includes(targetTeacher)
            );
            
            let content = "";
            if (match) {
                const classAttr = match.isChanged ? 'subject changed' : 'subject normal';
                const displayText = match.isChanged ? '☆' + match.subject : match.subject;
                content = `
                    <div class="${classAttr}">${displayText}</div>
                    <div class="class-name">${match.className}</div>
                `;
            }
            html += `<div class="cell">${content}</div>`;
        });
    }
    container.innerHTML = html;
}

function updateWeek(v) { weekOffset += v; render(); }
function resetWeek() { weekOffset = 0; render(); }
window.onload = init;
</script>
</body>
</html>
